
  redis-session:
    image: redis:${REDIS_SESSION_VERSION}
    env_file: .env
    ports:
      - "6379"
    #volumes:
    #  - "./.warp/docker/volumes/redis-session:/data"
    volumes:
      - ${REDIS_SESSION_CONF}:/usr/local/etc/redis/redis.conf
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
      - --maxmemory
      - ${REDIS_SESSION_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - ${REDIS_SESSION_MAXMEMORY_POLICY:-noeviction}
    networks:
      - back
