
  redis-fpc:
    image: redis:${REDIS_FPC_VERSION}
    env_file: .env
    ports:
      - "6379"
    #volumes:
    #  - "./.warp/docker/volumes/redis-fpc:/data"
    volumes:
      - ${REDIS_FPC_CONF}:/usr/local/etc/redis/redis.conf
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
      - --maxmemory
      - ${REDIS_FPC_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - ${REDIS_FPC_MAXMEMORY_POLICY:-allkeys-lru}
    networks:
      - back
