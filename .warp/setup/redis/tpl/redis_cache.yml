
  redis-cache:
    image: redis:${REDIS_CACHE_VERSION}
    env_file: .env
    ports:
      - "6379"
    #volumes:
    #  - "./.warp/docker/volumes/redis-cache:/data"
    volumes:
      - ${REDIS_CACHE_CONF}:/usr/local/etc/redis/redis.conf
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
      - --maxmemory
      - ${REDIS_CACHE_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - ${REDIS_CACHE_MAXMEMORY_POLICY:-allkeys-lru}
    networks:
      - back
